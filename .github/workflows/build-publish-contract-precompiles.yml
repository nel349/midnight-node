name: +contract-precompiles (Build ledger test static data contracts and CI image)

on:
  workflow_dispatch:
  schedule:
    # Once a week
    - cron: "0 0 * * 0"
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true
jobs:
  build:
    name: Precompile contracts (linux/${{ matrix.platform }})
    strategy:
      matrix:
        # Define matrix with platform and corresponding GitHub-hosted runner
        include:
          - platform: amd64
            runner: ubuntu-latest-16-core-x64 # Default x86_64 GitHub-hosted runner
          - platform: arm64
            runner: ubuntu-latest-8-core-arm64 # Native ARM64 GitHub-hosted runner (public preview)

    runs-on: ${{ matrix.runner }}

    env:
      FORCE_COLOR: 1
    steps:
      # Install Earthly
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      # Checkout the node repo
      - name: Checkout node repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 #v6.0.1

      - name: Login to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      # Log in to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef  #v3.6.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      # Run Earthly build with platform-specific flags
      - name: Run Earthly build for linux/${{ matrix.platform }}
        run: |
          # Force cargo to use CLI git instead of libgit2 (more robust in CI)
          mkdir -p "$HOME"/.cargo
          echo "[net]" >> "$HOME"/.cargo/config
          echo "git-fetch-with-cli = true" >> "$HOME"/.cargo/config

          # Run Earthly platform-specific image builds
          # (todo: we can skip pushing to GHCR here and push directly to dockerhub)
          . ./.envrc && earthly --ci --platform=linux/${{ matrix.platform }} --push +node-ci-image-single-platform

          export VERSION="1.90"
          docker pull ghcr.io/midnight-ntwrk/midnight-node-ci:${VERSION}-${{ matrix.platform }}

          echo "Tag and push ${VERSION} images"
          docker tag ghcr.io/midnight-ntwrk/midnight-node-ci:${VERSION}-${{ matrix.platform }} midnightntwrk/midnight-node-ci:${VERSION}-${{ matrix.platform }}

          echo "Push ${VERSION} images to Docker Hub"
          docker push midnightntwrk/midnight-node-ci:${VERSION}-${{ matrix.platform }}

  publish_to_dockerhub:
    # needed so forks can run ci jobs
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  #v3.12.0

      - name: Login to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_USER }}
          password: ${{ secrets.DOCKERHUB_MIDNIGHTNTWRK_TOKEN }}

      - name: Create multiplatform image (Docker Hub)
        run: |
          export VERSION="1.90"

          docker buildx imagetools create \
            -t midnightntwrk/midnight-node-ci:${VERSION} \
            midnightntwrk/midnight-node-ci:${VERSION}-amd64 \
            midnightntwrk/midnight-node-ci:${VERSION}-arm64
